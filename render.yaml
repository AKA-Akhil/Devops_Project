services:
  - type: web
    name: devops-project-server
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: "8080"
      - key: NODE_ENV
        value: production
      - key: GITHUB_TOKEN
        sync: false
      - key: MODEL_PROVIDER
        value: fine-tuned
      - key: MODEL_NAME
        sync: false
      - key: MODEL_API_KEY
        sync: false
      - key: MODEL_BASE_URL
        sync: false
      - key: DATABASE_URL
        sync: false
    healthCheckPath: /api/health
    autoDeploy: true
