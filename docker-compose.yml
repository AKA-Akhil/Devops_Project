name: devops-project

services:
  devops-project-server:
    container_name: devops-project-server
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    ports:
      - "8080:8080"
    restart: unless-stopped

  devops-project-client:
    container_name: devops-project-client
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - devops-project-server
    ports:
      - "5173:80"
    restart: unless-stopped
