apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project-client
  namespace: devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-project-client
  template:
    metadata:
      labels:
        app: devops-project-client
    spec:
      containers:
        - name: devops-project-client
          image: ghcr.io/owner/devops-project-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 6
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
