apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-project-server
  namespace: devops-project
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-project-server
  template:
    metadata:
      labels:
        app: devops-project-server
    spec:
      containers:
        - name: devops-project-server
          image: ghcr.io/owner/devops-project-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: devops-project-config
            - secretRef:
                name: devops-project-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 512Mi
