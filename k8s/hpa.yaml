apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-project-server-hpa
  namespace: devops-project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-project-server
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-project-client-hpa
  namespace: devops-project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-project-client
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
