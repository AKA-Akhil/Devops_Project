name: Devops project CI CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE_NAME: devops-project-server
  CLIENT_IMAGE_NAME: devops-project-client
  K8S_NAMESPACE: devops-project

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Run server tests
        working-directory: server
        run: npm test

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Run client checks (build)
        working-directory: client
        run: npm run build

  docker_build_and_push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower case owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.SERVER_IMAGE_NAME }}:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=/api
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.CLIENT_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ env.CLIENT_IMAGE_NAME }}:latest

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: docker_build_and_push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.ENABLE_K8S_DEPLOY == 'true' && vars.DEPLOY_RUNNER == 'github-hosted'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$HOME/.kube/config"

      - name: Create namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create or update application secret
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} create secret generic devops-project-secrets \
            --from-literal=GITHUB_TOKEN="${{ secrets.DEVOPS_PROJECT_GITHUB_TOKEN }}" \
            --from-literal=MODEL_API_KEY="${{ secrets.DEVOPS_PROJECT_MODEL_API_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/server-deployment.yaml
          kubectl apply -f k8s/server-service.yaml
          kubectl apply -f k8s/client-deployment.yaml
          kubectl apply -f k8s/client-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update deployment images
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/devops-project-server \
            devops-project-server=${{ env.REGISTRY }}/$OWNER/${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }}
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/devops-project-client \
            devops-project-client=${{ env.REGISTRY }}/$OWNER/${{ env.CLIENT_IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/devops-project-server --timeout=180s
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/devops-project-client --timeout=180s

  deploy_self_hosted:
    name: Deploy to Kubernetes (Self-Hosted)
    runs-on: self-hosted
    needs: docker_build_and_push
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && vars.ENABLE_K8S_DEPLOY == 'true' && vars.DEPLOY_RUNNER == 'self-hosted'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify kubectl context
        shell: powershell
        run: |
          kubectl version --client
          kubectl config current-context

      - name: Create namespace
        shell: powershell
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create or update application secret
        shell: powershell
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} create secret generic devops-project-secrets `
            --from-literal=GITHUB_TOKEN="${{ secrets.DEVOPS_PROJECT_GITHUB_TOKEN }}" `
            --from-literal=MODEL_API_KEY="${{ secrets.DEVOPS_PROJECT_MODEL_API_KEY }}" `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply manifests
        shell: powershell
        run: |
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/server-deployment.yaml
          kubectl apply -f k8s/server-service.yaml
          kubectl apply -f k8s/client-deployment.yaml
          kubectl apply -f k8s/client-service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Update deployment images
        shell: powershell
        run: |
          $owner = "${{ github.repository_owner }}".ToLower()
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/devops-project-server devops-project-server=${{ env.REGISTRY }}/$owner/${{ env.SERVER_IMAGE_NAME }}:${{ github.sha }}
          kubectl -n ${{ env.K8S_NAMESPACE }} set image deployment/devops-project-client devops-project-client=${{ env.REGISTRY }}/$owner/${{ env.CLIENT_IMAGE_NAME }}:${{ github.sha }}

      - name: Wait for rollout
        shell: powershell
        run: |
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/devops-project-server --timeout=180s
          kubectl -n ${{ env.K8S_NAMESPACE }} rollout status deployment/devops-project-client --timeout=180s
